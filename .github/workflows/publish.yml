name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write  # required for keyless cosign signing via OIDC

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            central.sonatype.com:443
            fulcio.sigstore.dev:443
            github.com:443
            keys.openpgp.org:443
            keyserver.ubuntu.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            rekor.sigstore.dev:443
            repo.maven.apache.org:443
            repo1.maven.org:443
            timestamp.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            uploads.github.com:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Import GPG key
        run: |
          echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: Build, test and publish to Maven Central
        run: mvn --batch-mode clean deploy -P release
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release artifacts with cosign (keyless / OIDC)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          for artifact in \
            target/common-license-lib-${VERSION}.jar \
            target/common-license-lib-${VERSION}-sources.jar \
            target/common-license-lib-${VERSION}-javadoc.jar; do
            if [ -f "$artifact" ]; then
              cosign sign-blob --yes \
                --bundle "${artifact}.bundle" \
                "${artifact}"
            fi
          done

      - name: Create GitHub Release with artifacts and signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          gh release create "${{ github.ref_name }}" \
            target/common-license-lib-${VERSION}.jar \
            target/common-license-lib-${VERSION}.jar.bundle \
            target/common-license-lib-${VERSION}-sources.jar \
            target/common-license-lib-${VERSION}-sources.jar.bundle \
            target/common-license-lib-${VERSION}-javadoc.jar \
            target/common-license-lib-${VERSION}-javadoc.jar.bundle \
            --title "Release ${{ github.ref_name }}" \
            --notes "## common-license-lib ${{ github.ref_name }}

          See [CHANGELOG.md](https://github.com/PIsberg/common-license-lib/blob/main/CHANGELOG.md) for what's new.

          ### Maven
          \`\`\`xml
          <dependency>
            <groupId>se.deversity.common</groupId>
            <artifactId>common-license-lib</artifactId>
            <version>${VERSION}</version>
          </dependency>
          \`\`\`

          ### Gradle
          \`\`\`kotlin
          implementation(\"se.deversity.common:common-license-lib:${VERSION}\")
          \`\`\`

          ### Verify a cosign signature
          \`\`\`bash
          cosign verify-blob --bundle common-license-lib-${VERSION}.jar.bundle \\
            --certificate-identity-regexp 'https://github.com/PIsberg/common-license-lib' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            common-license-lib-${VERSION}.jar
          \`\`\`"
