name: Tests & Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: [ '21', '25' ]

    steps:
      - name: Harden the runner (Block unexpected outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            cli.codecov.io:443
            codecov.io:443
            github.com:443
            ingest.codecov.io:443
            keys.openpgp.org:443
            keyserver.ubuntu.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            repo.maven.apache.org:443
            repo1.maven.org:443
            storage.googleapis.com:443
            uploader.codecov.io:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Prepare local Maven repository
        run: mkdir -p .m2/repository

      - name: Run library tests and install artifact
        run: mvn -Dmaven.repo.local=.m2/repository clean install

      - name: Run consumer-fixture tests
        run: mvn -Dmaven.repo.local=.m2/repository -f consumer-fixture/pom.xml test

      - name: Run all example tests
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/pom.xml" ]; then
              echo "Running tests in $dir"
              mvn -Dmaven.repo.local=.m2/repository -f "$dir/pom.xml" test
            fi
          done

      - name: Upload coverage to Codecov
        if: matrix.java-version == '21'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  gradle:
    name: Gradle Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: [ '21', '25' ]

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.adoptium.net:443
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            plugins.gradle.org:443
            plugins-artifacts.gradle.org:443
            repo.maven.apache.org:443
            repo1.maven.org:443
            gradle.org:443
            services.gradle.org:443
            downloads.gradle.org:443
            jcenter.bintray.com:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Gradle build
        run: ./gradlew --no-daemon build
